<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 6 - AI Writing Assistant</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <h1>AI Writing Assistant</h1>
      <p class="subtitle">Enter a topic and get an AI-generated paragraph</p>

      <div class="input-group">
        <input 
          type="text" 
          id="topicInput" 
          placeholder="Enter a topic e.g. black holes, productivity..."
        />
        <button id="generateBtn">Generate</button>
      </div>

      <div id="output" class="output">
        <p class="placeholder">Your AI response will appear here...</p>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
