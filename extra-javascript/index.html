<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Day 5 - JavaScript</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 2rem;
        background: #1a1a2e;
        color: #e0e0e0;
      }
      button {
        background: #00b4d8;
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 6px;
        font-size: 1rem;
        cursor: pointer;
        margin-top: 1rem;
      }
      #message {
        margin-top: 1.5rem;
        font-size: 1.25rem;
      }
    </style>
  </head>
  <body>
    <h1>User Profile</h1>
<div id="profile">Loading...</div>

<script>
  const loadUser = async () => {
    const response = await fetch("https://jsonplaceholder.typicode.com/users/1");
    const data = await response.json();
    
    const profile = document.getElementById("profile");
    profile.textContent = data.name + " — " + data.email;
  };

  loadUser();
</script>
  </body>
</html>
